name: Autonomous AI Course Generator

on:
  schedule:
    - cron: '0 7 * * *' # 12:30 PM IST daily
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies and patch ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick ffmpeg
          POLICY_FILE=$(find /etc -name "policy.xml" 2>/dev/null | grep -i "ImageMagick" | head -n 1)
          if [ -z "$POLICY_FILE" ]; then
            echo "❌ CRITICAL: Could not find ImageMagick's policy.xml file!"
            exit 1
          fi
          echo "✅ Found policy file at: $POLICY_FILE, applying patches..."
          sudo sed -i 's/<policy domain="resource" name="width" value=".*"\/>/<policy domain="resource" name="width" value="16384"\/>/' "$POLICY_FILE"
          sudo sed -i 's/<policy domain="resource" name="height" value=".*"\/>/<policy domain="resource" name="height" value="16384"\/>/' "$POLICY_FILE"

          echo "--- Installing Python packages ---"
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "✅ Dependencies installed."

      - name: 🔑 Restore API credentials from base64
        run: |
          echo "${{ secrets.CLIENT_SECRET_B64 }}" | base64 -d > client_secrets.json
          echo "${{ secrets.CREDENTIALS_B64 }}" | base64 -d > credentials.json
        shell: bash

      - name: 🚀 Run Autonomous Production Pipeline
        id: production-run
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'moonshotai/kimi-k2.6' }}
          NVIDIA_TTS_API_KEY: ${{ secrets.NVIDIA_TTS_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python main.py

      - name: 🔎 Upload Audio Artifact for Debugging
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audio-debug-files
          path: output/*.wav

      - name: 🎥 Upload Final Video for Debugging
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-videos
          path: output/*.mp4

      - name: 🎞️ Generate demo GIF from latest video
        if: steps.production-run.outcome == 'success'
        run: |
          VIDEO=$(ls output/long_video_*.mp4 2>/dev/null | head -n 1)
          if [ -n "$VIDEO" ]; then
            echo "✅ Found video: $VIDEO — converting to GIF..."
            ffmpeg -y -ss 0 -t 12 -i "$VIDEO" \
              -filter_complex "[0:v] fps=8,scale=320:-1:flags=lanczos,split [a][b];[a] palettegen [p];[b][p] paletteuse" \
              images/demo.gif
            echo "✅ Demo GIF created at images/demo.gif"
          else
            echo "⚠️ No long video found in output/, skipping GIF creation."
          fi

      - name: 💾 Commit and push content plan and demo GIF
        if: steps.production-run.outcome == 'success'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add content_plan.json images/demo.gif
          git commit -m "feat: Update content plan and demo GIF after daily video production" || echo "No changes to commit"
          git push
